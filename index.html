<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Bitcoin Clicker | Frojy Games</title>

    <style>

        /* CUSTOM FONT */
        @font-face {
            font-family: 'CustomFont';
            src: url('fonts/SyneMono-Regular.ttf');
        }

        body {
            background-color: #ece75f;
            font-family: 'CustomFont', Arial;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        #score {
            color: white;
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* wrapper fixes spin + shrink conflict */
        .coin-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 4s linear infinite;
        }

        img {
            width: 300px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .shrink {
            transform: scale(0.92);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <h1 id="score">0</h1>

    <div class="coin-wrapper" id="wrapper">
        <img id="coin" src="images/bitcoin.png" onclick="addScore()">
    </div>

    <script>
        let score = 0;

        // load saved score
        if (localStorage.getItem("score")) {
            score = parseInt(localStorage.getItem("score"));
            document.getElementById("score").innerText = score;
        }

        function addScore() {
            score++;
            document.getElementById("score").innerText = score;

            localStorage.setItem("score", score);

            let coin = document.getElementById("coin");

            coin.classList.add("shrink");

            setTimeout(() => {
                coin.classList.remove("shrink");
            }, 100);
        }
    </script>

</body>

</html>
