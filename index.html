<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Bitcoin Clicker | Frojy Games</title>

    <style>
        body {
            background-color: yellow;
            text-align: center;
            font-family: Arial;
        }

        #score {
            color: white;
            font-size: 40px;
            margin-top: 50px;
        }

        img {
            width: 300px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1 id="score">0</h1>

    <img src="bitcoin.png" onclick="addScore()">

    <script>
        let score = 0;

        function addScore() {
            score++;
            document.getElementById("score").innerText = score;
        }
    </script>

</body>

</html>
